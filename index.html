<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gioco Didattico - Equilibrio della Leva</title>

<style>
/* =====================================================
   STILE GENERALE
   ===================================================== */
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
    padding: 20px;
}

.hidden {
    display: none;
}

/* =====================================================
   STRUTTURA LEVA
   ===================================================== */
.leva-container {
    width: 900px;
    margin: 40px auto;
    position: relative;
}

/* Asta della leva */
.leva {
    position: relative;
    width: 900px;
    height: 10px;
    background: #333;
    transform-origin: center;
    transition: transform 0.5s ease-out;
}

/* Fulcro */
.fulcro {
    position: absolute;
    left: 50%;
    top: -18px;
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid #555;
    transform: translateX(-50%);
}

/* =====================================================
   TACCHETTE
   ===================================================== */
.tacchette {
    position: absolute;
    top: 10px;
    width: 100%;
    height: 20px;
    display: flex;
}

.tacca {
    flex: 1;
    position: relative;
}

/* Linea verticale della tacca */
.tacca::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 15px;
    background: #777;
    transform: translateX(-50%);
}

/* Tacca del fulcro */
.tacca.fulcro-tacca::after {
    height: 20px;
    background: #000;
}

/* =====================================================
   PESI
   ===================================================== */
.peso {
    position: absolute;
    top: -45px;
    width: 50px;
    height: 40px;
    line-height: 40px;
    font-weight: bold;
    color: white;
    text-align: center;
    transform: translateX(-50%); /* centra il peso sulla tacca */
}

.sinistra {
    background: #4CAF50;
}

.destra {
    background: #2196F3;
}

/* =====================================================
   CONTROLLI E INFO
   ===================================================== */
.controlli {
    margin-top: 20px;
}

button {
    padding: 10px 25px;
    font-size: 16px;
    margin-top: 15px;
}

.info {
    font-size: 18px;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- =====================================================
     INTRODUZIONE
     ===================================================== -->
<div id="intro">
    <h1>⚙️ Equilibrio della Leva</h1>
    <p>
        Usa le tacchette come riferimento per misurare la distanza dal fulcro.<br>
        In caso di errore verrà mostrato il calcolo dei momenti.
    </p>
    <button onclick="startGame()">Inizia</button>
</div>

<!-- =====================================================
     AREA DI GIOCO
     ===================================================== -->
<div id="game" class="hidden">

    <h2>Livello <span id="livello">1</span> / 3</h2>

    <div class="leva-container">
        <div class="leva" id="leva">

            <!-- Fulcro -->
            <div class="fulcro"></div>

            <!-- Tacchette: 12 a sinistra + fulcro + 12 a destra -->
            <div class="tacchette">
                <script>
                    for (let i = 0; i < 25; i++) {
                        if (i === 12) {
                            document.write('<div class="tacca fulcro-tacca"></div>');
                        } else {
                            document.write('<div class="tacca"></div>');
                        }
                    }
                </script>
            </div>

            <!-- Pesi -->
            <div class="peso sinistra" id="pesoSx"></div>
            <div class="peso destra" id="pesoDx">?</div>
        </div>
    </div>

    <!-- Controlli -->
    <div class="controlli">
        <label>Peso a destra (kg):</label>
        <input type="number" id="peso" min="1" max="20" value="5"><br><br>

        <label>Distanza dal fulcro (tacchette):</label>
        <input type="number" id="distanza" min="1" max="12" value="4"><br>

        <button onclick="verifica()">Verifica</button>
    </div>

    <!-- Info -->
    <div class="info">
        Tentativi rimasti: <span id="tentativi">3</span>
    </div>

    <div class="info" id="messaggio"></div>
</div>

<!-- =====================================================
     PAGINA FINALE
     ===================================================== -->
<div id="fine" class="hidden">
    <h1>🎉 Complimenti!</h1>
    <p>
        Hai completato tutti i livelli applicando correttamente
        il principio dei momenti.
    </p>
</div>

<script>
/* =====================================================
   VARIABILI GLOBALI
   ===================================================== */
let livello = 1;
let tentativi = 3;

const pesoSx = 10;     // peso noto a sinistra
let distanzaSx = 4;    // distanza casuale a sinistra

const centro = 450;    // centro dell’asta in px
const passo = 36;      // distanza tra tacchette in px

/* =====================================================
   AVVIO DEL GIOCO
   ===================================================== */
function startGame() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    generaLivello();
}

/* =====================================================
   GENERAZIONE NUOVO LIVELLO
   ===================================================== */
function generaLivello() {
    tentativi = 3;

    // distanza casuale del peso noto
    distanzaSx = Math.floor(Math.random() * 6) + 3;

    document.getElementById("livello").textContent = livello;
    document.getElementById("tentativi").textContent = tentativi;
    document.getElementById("messaggio").innerHTML = "";

    // posizionamento peso sinistro sulla tacca corretta
    const pesoSxEl = document.getElementById("pesoSx");
    pesoSxEl.textContent = pesoSx + "kg";
    pesoSxEl.style.left = centro - distanzaSx * passo + "px";

    // reset leva e peso destro
    document.getElementById("leva").style.transform = "rotate(0deg)";
    document.getElementById("pesoDx").textContent = "?";
}

/* =====================================================
   VERIFICA DELL’EQUILIBRIO
   ===================================================== */
function verifica() {
    const pesoDx = parseInt(document.getElementById("peso").value);
    const distanzaDx = parseInt(document.getElementById("distanza").value);

    // calcolo dei momenti
    const momentoSx = pesoSx * distanzaSx;
    const momentoDx = pesoDx * distanzaDx;

    const differenza = momentoDx - momentoSx;

    const leva = document.getElementById("leva");
    const messaggio = document.getElementById("messaggio");
    const pesoDxEl = document.getElementById("pesoDx");

    // posizionamento peso destro sulla tacca corretta
    pesoDxEl.textContent = pesoDx + "kg";
    pesoDxEl.style.left = centro + distanzaDx * passo + "px";

    // controllo equilibrio
    if (differenza === 0) {
        messaggio.textContent = "✅ Equilibrio raggiunto!";
        leva.style.transform = "rotate(0deg)";

        livello++;
        if (livello > 3) {
            document.getElementById("game").classList.add("hidden");
            document.getElementById("fine").classList.remove("hidden");
        } else {
            setTimeout(generaLivello, 1000);
        }
    } else {
        tentativi--;
        document.getElementById("tentativi").textContent = tentativi;

        // inclinazione proporzionale al disequilibrio
        let angolo = Math.max(Math.min(differenza * 0.4, 12), -12);
        leva.style.transform = `rotate(${angolo}deg)`;

        // mostra calcolo dei momenti
        messaggio.innerHTML =
            "❌ Disequilibrio<br>" +
            "Momento sinistro = " + pesoSx + " × " + distanzaSx + " = " + momentoSx + "<br>" +
            "Momento destro = " + pesoDx + " × " + distanzaDx + " = " + momentoDx;

        // fine tentativi → ritorno al livello 1
        if (tentativi === 0) {
            livello = 1;
            setTimeout(generaLivello, 1500);
        }
    }
}
</script>

</body>
</html>
