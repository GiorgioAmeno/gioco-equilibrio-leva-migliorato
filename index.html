<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gioco Didattico - Equilibrio della Leva</title>

<style>
/* =====================================================
   STILE GENERALE
   ===================================================== */
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
    padding: 20px;
}

.hidden {
    display: none;
}

/* =====================================================
   STRUTTURA LEVA (GRIGLIA DISCRETA)
   ===================================================== */
.leva-container {
    width: 1000px;
    margin: 40px auto;
}

.leva {
    display: grid;
    grid-template-columns: repeat(25, 1fr); /* 25 tacchette */
    align-items: center;
    position: relative;
    height: 80px;
    transition: transform 0.5s ease-out;
    transform-origin: center;
}

/* Asta */
.asta {
    grid-column: 1 / -1;
    height: 10px;
    background: #333;
    align-self: center;
}

/* =====================================================
   TACCHETTE
   ===================================================== */
.tacca {
    position: relative;
    height: 25px;
}

.tacca::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 2px;
    height: 15px;
    background: #777;
    transform: translateX(-50%);
}

.fulcro-tacca::after {
    height: 20px;
    background: red;
}

/* =====================================================
   PESI
   ===================================================== */
.peso {
    position: absolute;
    top: -40px;
    width: 40px;
    height: 40px;
    line-height: 40px;
    color: white;
    font-weight: bold;
    justify-self: center; /* CENTRATO SULLA TACCA */
    align-self: start;
}

.sinistra { background: #4CAF50; }
.destra   { background: #2196F3; }

/* =====================================================
   CONTROLLI
   ===================================================== */
.controlli {
    margin-top: 20px;
}

.info {
    font-size: 16px;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<div id="intro">
    <h1>⚙️ Equilibrio della Leva</h1>
    <p>
        Ogni peso è posizionato esattamente su una tacchetta.<br>
        In caso di errore verrà mostrato il calcolo dei momenti.
    </p>
    <button onclick="startGame()">Inizia</button>
</div>

<!-- ================= GIOCO ================= -->
<div id="game" class="hidden">

    <h2>Livello <span id="livello">1</span> / 3</h2>

    <div class="leva-container">
        <div class="leva" id="leva">

            <!-- Asta -->
            <div class="asta"></div>

            <!-- Tacchette + pesi -->
            <script>
                for (let i = 0; i < 25; i++) {
                    if (i === 12) {
                        document.write('<div class="tacca fulcro-tacca"></div>');
                    } else {
                        document.write('<div class="tacca"></div>');
                    }
                }
            </script>

            <!-- Pesi -->
            <div class="peso sinistra" id="pesoSx"></div>
            <div class="peso destra" id="pesoDx"></div>

        </div>
    </div>

    <div class="controlli">
        Peso destro (kg):
        <input type="number" id="peso" value="5" min="1" max="20"><br><br>
        Distanza (tacchette):
        <input type="number" id="distanza" value="4" min="1" max="12"><br>
        <button onclick="verifica()">Verifica</button>
    </div>

    <div class="info">
        Tentativi: <span id="tentativi">3</span>
    </div>

    <div class="info" id="messaggio"></div>
</div>

<!-- ================= FINE ================= -->
<div id="fine" class="hidden">
    <h1>🎉 Complimenti!</h1>
    <p>Hai applicato correttamente il principio dei momenti.</p>
</div>

<script>
/* =====================================================
   VARIABILI
   ===================================================== */
let livello = 1;
let tentativi = 3;

const pesoSx = 10;
let distanzaSx;

const FULCRO = 12;

/* =====================================================
   AVVIO
   ===================================================== */
function startGame() {
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    generaLivello();
}

/* =====================================================
   NUOVO LIVELLO
   ===================================================== */
function generaLivello() {
    tentativi = 3;
    distanzaSx = Math.floor(Math.random() * 6) + 3;

    document.getElementById("livello").textContent = livello;
    document.getElementById("tentativi").textContent = tentativi;
    document.getElementById("messaggio").innerHTML = "";

    const pesoSxEl = document.getElementById("pesoSx");
    pesoSxEl.textContent = pesoSx + "kg";
    pesoSxEl.style.gridColumn = (FULCRO - distanzaSx + 1);
}

/* =====================================================
   VERIFICA
   ===================================================== */
function verifica() {
    const pesoDx = +document.getElementById("peso").value;
    const distanzaDx = +document.getElementById("distanza").value;

    const momentoSx = pesoSx * distanzaSx;
    const momentoDx = pesoDx * distanzaDx;

    const diff = momentoDx - momentoSx;

    const pesoDxEl = document.getElementById("pesoDx");
    pesoDxEl.textContent = pesoDx + "kg";
    pesoDxEl.style.gridColumn = (FULCRO + distanzaDx + 1);

    const leva = document.getElementById("leva");
    const msg = document.getElementById("messaggio");

    if (diff === 0) {
        leva.style.transform = "rotate(0deg)";
        msg.textContent = "✅ Equilibrio raggiunto!";
        livello++;
        if (livello > 3) {
            game.classList.add("hidden");
            fine.classList.remove("hidden");
        } else {
            setTimeout(generaLivello, 1000);
        }
    } else {
        tentativi--;
        document.getElementById("tentativi").textContent = tentativi;

        let angolo = Math.max(Math.min(diff * 0.4, 12), -12);
        leva.style.transform = `rotate(${angolo}deg)`;

        msg.innerHTML =
            "❌ Disequilibrio<br>" +
            `Momento sinistro = ${pesoSx} × ${distanzaSx} = ${momentoSx}<br>` +
            `Momento destro = ${pesoDx} × ${distanzaDx} = ${momentoDx}`;

        if (tentativi === 0) {
            livello = 1;
            setTimeout(generaLivello, 1500);
        }
    }
}
</script>

</body>
</html>
